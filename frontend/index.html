<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" id="favicon" type="image/svg+xml" href="">
    <title>Streamer DVR Dashboard</title>
    <script>
      (function() {
        const link = document.getElementById('favicon');
        let start = null;
        
        function update(timestamp) {
          if (!start) start = timestamp;
          const elapsed = timestamp - start;
          
          // 旋轉角度：保持一致速度 (0.12 deg/ms)
          const angle = (elapsed * 0.12) % 360;
          
          // 呼吸燈透明度：平滑正弦波
          const opacity = (Math.sin(elapsed * 0.003) + 1) / 2 * 0.8 + 0.2;
          
          const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
              <rect width="100" height="100" rx="25" fill="%231a1a1b"/>
              <g transform="rotate(${angle} 50 50)">
                <path d="M50 20 A30 30 0 0 1 80 50" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-opacity="0.9"/>
                <path d="M80 50 A30 30 0 0 1 50 80" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-opacity="0.4"/>
                <path d="M50 80 A30 30 0 0 1 20 50" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2"/>
              </g>
              <circle cx="50" cy="50" r="15" fill="%23ff3b30" fill-opacity="${opacity}"/>
            </svg>
          `.trim().replace(/>\s+</g, '><').replace(/#/g, '%23');
          
          link.href = "data:image/svg+xml," + svg;
          window.requestAnimationFrame(update);
        }
        
        window.requestAnimationFrame(update);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
